<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rasm Generatsiya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
    --accent: #7c6dfa;
    --accent2: #c084fc;
    --accent-glow: rgba(124,109,250,0.25);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,109,250,0.12) 0%, transparent 70%);
    top: -200px;
    right: -100px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeUp 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid rgba(192,132,252,0.25);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 1.2rem;
    background: rgba(192,132,252,0.07);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #f0eeff 30%, #7c6dfa 80%, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.75rem;
  }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Token section */
  .token-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .section-label {
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .token-input-row {
    display: flex;
    gap: 10px;
  }

  input[type="password"], input[type="text"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }

  input[type="password"]:focus, input[type="text"]:focus, textarea:focus {
    border-color: rgba(124,109,250,0.5);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.1);
  }

  .save-btn {
    padding: 10px 18px;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .save-btn:hover { background: #6b5ce7; transform: translateY(-1px); }

  .token-link {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .token-link a { color: var(--accent2); text-decoration: none; }
  .token-link a:hover { text-decoration: underline; }

  /* Main card */
  .main-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  textarea#prompt {
    width: 100%;
    min-height: 100px;
    resize: vertical;
    margin-bottom: 1rem;
    font-size: 15px;
    line-height: 1.6;
  }

  /* Style pills */
  .style-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .pill {
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .pill:hover { border-color: rgba(124,109,250,0.4); color: var(--text); }

  .pill.active {
    background: rgba(124,109,250,0.18);
    border-color: rgba(124,109,250,0.6);
    color: #a89dff;
  }

  /* Model select */
  .model-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    cursor: pointer;
    flex: 1;
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 24px rgba(124,109,250,0.3);
  }

  .gen-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,109,250,0.45);
  }

  .gen-btn:active:not(:disabled) { transform: translateY(0); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Result */
  #resultArea { margin-top: 2rem; }

  .img-wrap {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border2);
    animation: fadeUp 0.5s ease both;
  }

  .img-wrap img {
    width: 100%;
    display: block;
  }

  .img-meta {
    background: var(--surface2);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .img-meta-text {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 8px;
    background: rgba(124,109,250,0.15);
    color: #a89dff;
    border: 1px solid rgba(124,109,250,0.3);
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
  }

  .dl-btn:hover { background: rgba(124,109,250,0.25); }

  /* Loader */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 0;
    gap: 16px;
  }

  .loader-ring {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2.5px solid var(--border2);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }

  .loader-label {
    font-size: 13px;
    color: var(--muted);
  }

  .loader-dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* Error */
  .error {
    padding: 14px 18px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 12px;
    color: #fca5a5;
    font-size: 13px;
    margin-top: 1rem;
  }

  /* Gallery */
  .gallery-section {
    margin-top: 2.5rem;
    animation: fadeUp 0.5s ease both;
  }

  .gallery-title {
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .gallery-title::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .gallery-item {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .gallery-item:hover {
    border-color: rgba(124,109,250,0.4);
    transform: translateY(-2px);
  }

  .gallery-item img { width: 100%; display: block; }

  .gallery-item-label {
    padding: 6px 10px;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 520px) {
    .container { padding: 2rem 1rem 3rem; }
    .main-card { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="glow-orb"></div>

<div class="container">
  <header>
    <div class="badge">✦ Stable Diffusion XL</div>
    <h1>AI Rasm Yaratish</h1>
    <p class="subtitle">So'z yozing — sun'iy intellekt rasm chizadi</p>
  </header>

  <!-- Token -->
  <div class="token-section">
    <div class="section-label">Hugging Face Token</div>
    <div class="token-input-row">
      <input type="password" id="hfToken" placeholder="hf_xxxxxxxxxxxxxxxx" />
      <button class="save-btn" onclick="saveToken()">Saqlash</button>
    </div>
    <p class="token-link">
      Bepul token: <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a> → New token → Read
    </p>
  </div>

  <!-- Main -->
  <div class="main-card">
    <div class="section-label" style="margin-bottom:12px">Tasvirni tasvirlab bering</div>
    <textarea id="prompt" placeholder="Masalan: A majestic eagle soaring over snowy Tian Shan mountains at sunrise, golden hour, photorealistic..."></textarea>

    <div class="style-grid" id="styleGrid">
      <button class="pill active" data-s="">Oddiy</button>
      <button class="pill" data-s=", photorealistic, hyperdetailed, 8k">📷 Foto</button>
      <button class="pill" data-s=", digital art, concept art, vibrant colors">🎨 Digital Art</button>
      <button class="pill" data-s=", anime style, studio ghibli, detailed">🌸 Anime</button>
      <button class="pill" data-s=", oil painting, impressionist, textured">🖌️ Rasm</button>
      <button class="pill" data-s=", cinematic, dramatic lighting, film grain">🎬 Kino</button>
      <button class="pill" data-s=", watercolor, soft colors, dreamy">💧 Akvarel</button>
      <button class="pill" data-s=", 3d render, octane render, subsurface scattering">🧊 3D</button>
    </div>

    <div class="model-row">
      <span style="font-size:12px;color:var(--muted);white-space:nowrap">Model:</span>
      <select id="modelSelect">
        <option value="stabilityai/stable-diffusion-xl-base-1.0">SDXL Base 1.0 (Eng yaxshi)</option>
        <option value="runwayml/stable-diffusion-v1-5">SD v1.5 (Tezroq)</option>
        <option value="stabilityai/stable-diffusion-2-1">SD 2.1</option>
      </select>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generate()">
      ✦ Rasm yaratish
    </button>

    <div id="resultArea"></div>
  </div>

  <!-- Gallery -->
  <div class="gallery-section" id="gallerySection" style="display:none">
    <div class="gallery-title">Oxirgi rasmlar</div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<script>
let selectedStyle = '';
let gallery = [];
let savedToken = localStorage.getItem('hf_token') || '';

if (savedToken) {
  document.getElementById('hfToken').value = savedToken;
}

function saveToken() {
  const t = document.getElementById('hfToken').value.trim();
  if (t) {
    localStorage.setItem('hf_token', t);
    const btn = document.querySelector('.save-btn');
    btn.textContent = '✓ Saqlandi';
    btn.style.background = '#16a34a';
    setTimeout(() => { btn.textContent = 'Saqlash'; btn.style.background = ''; }, 2000);
  }
}

document.getElementById('styleGrid').addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p) return;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  p.classList.add('active');
  selectedStyle = p.dataset.s;
});

async function generate() {
  const token = document.getElementById('hfToken').value.trim();
  const promptText = document.getElementById('prompt').value.trim();
  const model = document.getElementById('modelSelect').value;
  const resultArea = document.getElementById('resultArea');
  const btn = document.getElementById('genBtn');

  if (!token) { showError('API token kiriting va "Saqlash" tugmasini bosing!'); return; }
  if (!promptText) { showError('Rasm tavsifini yozing!'); return; }

  const fullPrompt = promptText + selectedStyle;

  btn.disabled = true;
  btn.innerHTML = '⏳ Yaratilmoqda...';
  resultArea.innerHTML = `
    <div class="loader">
      <div class="loader-ring"></div>
      <p class="loader-label">Rasm yaratilmoqda<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span></p>
      <p style="font-size:11px;color:var(--muted)">20–60 soniya kutish mumkin</p>
    </div>`;

  try {
    const res = await fetch(
      `https://api-inference.huggingface.co/models/${model}`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ inputs: fullPrompt, parameters: { width: 768, height: 768 } })
      }
    );

    if (!res.ok) {
      let errMsg = `Xatolik: ${res.status}`;
      try {
        const j = await res.json();
        if (res.status === 503) errMsg = 'Model yuklanmoqda. 30 soniya kutib, qaytadan urining.';
        else if (res.status === 401) errMsg = 'Token noto\'g\'ri. Hugging Face tokenini tekshiring.';
        else errMsg = j.error || errMsg;
      } catch(_) {}
      showError(errMsg);
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const short = promptText.length > 55 ? promptText.slice(0, 55) + '…' : promptText;

    resultArea.innerHTML = `
      <div class="img-wrap">
        <img src="${url}" alt="Generatsiya qilingan rasm" />
        <div class="img-meta">
          <span class="img-meta-text">${short}</span>
          <a class="dl-btn" href="${url}" download="ai-rasm-${Date.now()}.png">↓ Yuklab olish</a>
        </div>
      </div>`;

    addToGallery(url, short);

  } catch(err) {
    showError('Tarmoq xatosi: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ Rasm yaratish';
  }
}

function showError(msg) {
  document.getElementById('resultArea').innerHTML = `<div class="error">⚠ ${msg}</div>`;
}

function addToGallery(url, label) {
  gallery.unshift({ url, label });
  if (gallery.length > 8) gallery.pop();

  const gs = document.getElementById('gallerySection');
  const gg = document.getElementById('galleryGrid');
  gs.style.display = 'block';
  gg.innerHTML = gallery.map((item, i) => `
    <div class="gallery-item" style="animation-delay:${i*0.05}s" onclick="viewImg('${item.url}')">
      <img src="${item.url}" alt="${item.label}" />
      <div class="gallery-item-label">${item.label}</div>
    </div>`).join('');
}

function viewImg(url) {
  window.open(url, '_blank');
}

document.getElementById('prompt').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
});
</script>
</body>
</html>
