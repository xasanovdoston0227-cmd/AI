<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rasm Generatsiya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
    --accent: #7c6dfa;
    --accent2: #c084fc;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none; z-index: 0;
  }
  .glow-orb { position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(124,109,250,0.12) 0%, transparent 70%); top: -200px; right: -100px; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
  header { text-align: center; margin-bottom: 2.5rem; animation: fadeUp 0.6s ease both; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); border: 1px solid rgba(192,132,252,0.25); padding: 5px 14px; border-radius: 20px; margin-bottom: 1.2rem; background: rgba(192,132,252,0.07); }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.1; background: linear-gradient(135deg, #f0eeff 30%, #7c6dfa 80%, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.75rem; }
  .subtitle { font-size: 15px; color: var(--muted); font-weight: 300; }
  .free-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #4ade80; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); padding: 4px 12px; border-radius: 20px; margin-top: 10px; }
  .main-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; animation: fadeUp 0.6s 0.1s ease both; }
  .section-label { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .section-label::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; width: 100%; min-height: 100px; resize: vertical; line-height: 1.6; margin-bottom: 1rem; transition: border-color 0.2s; }
  textarea:focus { border-color: rgba(124,109,250,0.5); box-shadow: 0 0 0 3px rgba(124,109,250,0.1); }
  .style-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .pill { font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em; }
  .pill:hover { border-color: rgba(124,109,250,0.4); color: var(--text); }
  .pill.active { background: rgba(124,109,250,0.18); border-color: rgba(124,109,250,0.6); color: #a89dff; }
  .size-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .size-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .size-btn:hover { border-color: rgba(124,109,250,0.4); color: var(--text); }
  .size-btn.active { background: rgba(124,109,250,0.18); border-color: rgba(124,109,250,0.6); color: #a89dff; }
  .gen-btn { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 24px rgba(124,109,250,0.3); }
  .gen-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,109,250,0.45); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #resultArea { margin-top: 2rem; }
  .img-wrap { border-radius: 16px; overflow: hidden; border: 1px solid var(--border2); animation: fadeUp 0.5s ease both; }
  .img-wrap img { width: 100%; display: block; }
  .img-meta { background: var(--surface2); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .img-meta-text { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .dl-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; padding: 7px 16px; border-radius: 8px; background: rgba(124,109,250,0.15); color: #a89dff; border: 1px solid rgba(124,109,250,0.3); text-decoration: none; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
  .dl-btn:hover { background: rgba(124,109,250,0.25); }
  .loader { display: flex; flex-direction: column; align-items: center; padding: 3rem 0; gap: 16px; }
  .loader-ring { width: 48px; height: 48px; border-radius: 50%; border: 2.5px solid var(--border2); border-top-color: var(--accent); animation: spin 0.9s linear infinite; }
  .loader-label { font-size: 13px; color: var(--muted); }
  .error { padding: 14px 18px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 12px; color: #fca5a5; font-size: 13px; margin-top: 1rem; }
  .gallery-section { margin-top: 2.5rem; }
  .gallery-title { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
  .gallery-title::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .gallery-item { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .gallery-item:hover { border-color: rgba(124,109,250,0.4); transform: translateY(-2px); }
  .gallery-item img { width: 100%; display: block; }
  .gallery-item-label { padding: 6px 10px; font-size: 11px; color: var(--muted); background: var(--surface2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 520px) { .container { padding: 2rem 1rem 3rem; } .main-card { padding: 1.25rem; } }
</style>
</head>
<body>
<div class="glow-orb"></div>
<div class="container">
  <header>
    <div class="badge">✦ Pollinations AI</div>
    <h1>AI Rasm Yaratish</h1>
    <p class="subtitle">So'z yozing — sun'iy intellekt rasm chizadi</p>
    <div class="free-badge">✓ 100% Bepul — Token kerak emas</div>
  </header>

  <div class="main-card">
    <div class="section-label">Tasvirni tasvirlab bering</div>
    <textarea id="prompt" placeholder="Masalan: BMW mashina Toshkent Teleminorasi oldida kechqurun, professional photo, 4k..."></textarea>

    <div class="style-grid" id="styleGrid">
      <button class="pill active" data-s="">Oddiy</button>
      <button class="pill" data-s=", photorealistic, hyperdetailed, 8k DSLR photo">📷 Foto</button>
      <button class="pill" data-s=", digital art, concept art, vibrant colors, trending on artstation">🎨 Digital Art</button>
      <button class="pill" data-s=", anime style, studio ghibli, detailed illustration">🌸 Anime</button>
      <button class="pill" data-s=", oil painting, impressionist brushwork, textured canvas">🖌️ Rasm</button>
      <button class="pill" data-s=", cinematic shot, dramatic lighting, film grain, anamorphic">🎬 Kino</button>
      <button class="pill" data-s=", watercolor painting, soft colors, dreamy atmosphere">💧 Akvarel</button>
      <button class="pill" data-s=", 3d render, octane render, physically based rendering">🧊 3D</button>
    </div>

    <div class="section-label" style="margin-bottom:10px">O'lcham</div>
    <div class="size-row" id="sizeRow">
      <button class="size-btn active" data-w="512" data-h="512">512×512</button>
      <button class="size-btn" data-w="768" data-h="768">768×768</button>
      <button class="size-btn" data-w="1024" data-h="576">1024×576 (Keng)</button>
      <button class="size-btn" data-w="576" data-h="1024">576×1024 (Uzun)</button>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generate()">✦ Rasm yaratish</button>
    <div id="resultArea"></div>
  </div>

  <div class="gallery-section" id="gallerySection" style="display:none">
    <div class="gallery-title">Oxirgi rasmlar</div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<script>
let selectedStyle = '';
let selW = 512, selH = 512;
let gallery = [];

document.getElementById('styleGrid').addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p) return;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  p.classList.add('active');
  selectedStyle = p.dataset.s;
});

document.getElementById('sizeRow').addEventListener('click', e => {
  const b = e.target.closest('.size-btn');
  if (!b) return;
  document.querySelectorAll('.size-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  selW = b.dataset.w; selH = b.dataset.h;
});

async function generate() {
  const promptText = document.getElementById('prompt').value.trim();
  const resultArea = document.getElementById('resultArea');
  const btn = document.getElementById('genBtn');
  if (!promptText) { showError('Rasm tavsifini yozing!'); return; }

  const fullPrompt = promptText + selectedStyle;
  const seed = Math.floor(Math.random() * 999999);
  const encodedPrompt = encodeURIComponent(fullPrompt);
  const imgUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${selW}&height=${selH}&seed=${seed}&nologo=true`;

  btn.disabled = true;
  btn.innerHTML = '⏳ Yaratilmoqda...';
  resultArea.innerHTML = `<div class="loader"><div class="loader-ring"></div><p class="loader-label">Rasm yaratilmoqda... (10–30 soniya)</p></div>`;

  const img = new Image();
  img.onload = function() {
    const short = promptText.length > 55 ? promptText.slice(0, 55) + '…' : promptText;
    resultArea.innerHTML = `
      <div class="img-wrap">
        <img src="${imgUrl}" alt="Generatsiya qilingan rasm" />
        <div class="img-meta">
          <span class="img-meta-text">${short}</span>
          <a class="dl-btn" href="${imgUrl}" download="ai-rasm-${seed}.png" target="_blank">↓ Yuklab olish</a>
        </div>
      </div>`;
    addToGallery(imgUrl, short);
    btn.disabled = false;
    btn.innerHTML = '✦ Rasm yaratish';
  };
  img.onerror = function() {
    showError('Xatolik yuz berdi. Qaytadan urining.');
    btn.disabled = false;
    btn.innerHTML = '✦ Rasm yaratish';
  };
  img.src = imgUrl;
}

function showError(msg) {
  document.getElementById('resultArea').innerHTML = `<div class="error">⚠ ${msg}</div>`;
}

function addToGallery(url, label) {
  gallery.unshift({ url, label });
  if (gallery.length > 8) gallery.pop();
  const gs = document.getElementById('gallerySection');
  const gg = document.getElementById('galleryGrid');
  gs.style.display = 'block';
  gg.innerHTML = gallery.map((item, i) => `
    <div class="gallery-item" style="animation-delay:${i*0.05}s" onclick="window.open('${item.url}','_blank')">
      <img src="${item.url}" alt="${item.label}" loading="lazy" />
      <div class="gallery-item-label">${item.label}</div>
    </div>`).join('');
}

document.getElementById('prompt').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
});
</script>
</body>
</html>
